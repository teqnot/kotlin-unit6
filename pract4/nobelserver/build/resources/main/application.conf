ktor {
  application {
    modules = [com.example.nobelserver.ApplicationKt.module]
  }
  deployment {
    port = 8080
    host = "0.0.0.0"
    watch = [com.example.nobelserver]
  }
}

database {
  driver = "org.postgresql.Driver"
  url = "jdbc:postgresql://localhost:5432/nobel_db"
  user = "nobel_user"
  password = "nobel_pass_123"
  poolSize = 10
}

auth {
  jwt {
    secret = "my-super-secret-key-for-jwt-signing-must-be-32-chars!"
    issuer = "nobel-api"
    audience = "nobel-clients"
    realm = "Nobel Prize API"
    tokenValiditySeconds = 1800
  }
}

external {
  nobelApi {
    baseUrl = "https://api.nobelprize.org/2.1"
    timeout = 30000
  }
}