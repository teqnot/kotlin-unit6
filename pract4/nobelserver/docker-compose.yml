version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: nobel-postgres
    environment:
      POSTGRES_DB: nobel_db
      POSTGRES_USER: nobel_user
      POSTGRES_PASSWORD: nobel_pass_123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/main/resources/migrations:/docker-entrypoint-initdb.d

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nobel_user -d nobel_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: